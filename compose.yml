services:
  blt:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    image: alexsherlygin/blt:V4.6
    labels:
      autoheal: "true"
    ports:
      - "${BLT_PORT:-8090}:8090"
    environment:
      BLT_HOST: ${BLT_HOST:-0.0.0.0}
      BLT_PORT: ${BLT_PORT:-8090}
      BLT_LAUNCH_BROWSER: ${BLT_LAUNCH_BROWSER:-false}
      GOLEM_CONFIG_ACTIVE: ${GOLEM_CONFIG_ACTIVE:-production}
      R_CONFIG_ACTIVE: ${R_CONFIG_ACTIVE:-production}
      BLT_EXPORT_DIR: ${BLT_EXPORT_DIR:-/exports}
      BLT_EXPORT_ROOT_NAME: ${BLT_EXPORT_ROOT_NAME:-Export Folder}
      BLT_HIDE_IMAGE_EXPORT_BUTTONS: ${BLT_HIDE_IMAGE_EXPORT_BUTTONS:-true}
      BLT_HEARTBEAT_FILE: ${BLT_HEARTBEAT_FILE:-/tmp/blt-heartbeat}
      BLT_HEARTBEAT_INTERVAL_SECS: ${BLT_HEARTBEAT_INTERVAL_SECS:-15}
      BLT_HEARTBEAT_MAX_AGE_SECS: ${BLT_HEARTBEAT_MAX_AGE_SECS:-90}
      BLT_HEALTHCHECK_HTTP_TIMEOUT_SECS: ${BLT_HEALTHCHECK_HTTP_TIMEOUT_SECS:-5}
    volumes:
      - ${HOME}/Desktop/BLT-Data:/data/project
      - ${HOME}/Desktop/BLT-Exports:/exports
    healthcheck:
      test: ["CMD", "/workspace/infra/docker/scripts/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped

  autoheal:
    image: willfarrell/autoheal:latest
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: 10
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/monitoring/prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    entrypoint:
      - /bin/sh
      - /etc/alertmanager/start_alertmanager.sh
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      TELEGRAM_API_URL: ${TELEGRAM_API_URL:-}
      SSL_CERT_DIR: ${ALERTMANAGER_SSL_CERT_DIR:-/etc/ssl/certs:/etc/alertmanager/custom-certs}
      HTTP_PROXY: ${ALERTMANAGER_HTTP_PROXY:-}
      HTTPS_PROXY: ${ALERTMANAGER_HTTPS_PROXY:-}
      NO_PROXY: ${ALERTMANAGER_NO_PROXY:-}
      http_proxy: ${ALERTMANAGER_HTTP_PROXY:-}
      https_proxy: ${ALERTMANAGER_HTTPS_PROXY:-}
      no_proxy: ${ALERTMANAGER_NO_PROXY:-}
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ./infra/monitoring/alertmanager/alertmanager.base.yml:/etc/alertmanager/alertmanager.base.yml:ro
      - ./infra/monitoring/alertmanager/start_alertmanager.sh:/etc/alertmanager/start_alertmanager.sh:ro
      - ./infra/docker/certs/zscaler-root.crt:/etc/alertmanager/custom-certs/zscaler-root.crt:ro
      - ./infra/docker/certs/zscaler-intermediate.crt:/etc/alertmanager/custom-certs/zscaler-intermediate.crt:ro
      - alertmanager_data:/alertmanager
    restart: unless-stopped

  blackbox-exporter:
    image: quay.io/prometheus/blackbox-exporter:latest
    command:
      - --config.file=/etc/blackbox_exporter/config.yml
    volumes:
      - ./infra/monitoring/blackbox/config.yml:/etc/blackbox_exporter/config.yml:ro
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    command:
      - --path.procfs=/host/proc
      - --path.rootfs=/rootfs
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    command:
      - --docker_only=true
      - --housekeeping_interval=30s
    ports:
      - "${CADVISOR_PORT:-8081}:8080"
    volumes:
      - /:/rootfs:ro
      - /run:/run:rw
      - /var/run:/var/run:rw
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    restart: unless-stopped

volumes:
  prometheus_data:
  alertmanager_data:
