<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1180" viewBox="0 0 1600 1180" role="img" aria-labelledby="title desc">
  <title id="title">BLT architecture overview</title>
  <desc id="desc">A visual overview of BLT showing launch paths, the Shiny and golem package core, shared state, server modules, filesystem persistence, and external dependencies.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6f1e8"/>
      <stop offset="55%" stop-color="#eef3f7"/>
      <stop offset="100%" stop-color="#fdfaf4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#22313f" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5a6773"/>
    </marker>
    <style>
      .canvas { fill: url(#bg); }
      .panel { fill: rgba(255,255,255,0.72); stroke: #d9e2ea; stroke-width: 1.5; }
      .card { stroke-width: 2; filter: url(#shadow); }
      .soft { fill: #ffffff; stroke: #cad4de; }
      .accent { fill: #264653; stroke: #1e3742; }
      .launch { fill: #e7eef6; stroke: #5f7992; }
      .ui { fill: #fff7e9; stroke: #b88437; }
      .server { fill: #e8f1ec; stroke: #4f7a62; }
      .state-global { fill: #fff3df; stroke: #b88437; }
      .state-auth { fill: #eef3fb; stroke: #5e7591; }
      .state-bus { fill: #edf7f1; stroke: #547a65; }
      .module-form { fill: #fdf1e7; stroke: #c08245; }
      .module-upload { fill: #eef6fb; stroke: #6284a1; }
      .module-pano { fill: #eef7ee; stroke: #5a8566; }
      .storage { fill: #f4f8f3; stroke: #6b846f; }
      .external { fill: #f1f4f8; stroke: #6a7f95; }
      .note { fill: #fff9eb; stroke: #d3a85a; stroke-width: 2; stroke-dasharray: 10 8; }
      .panel-label { font: 700 15px 'Avenir Next', 'Segoe UI', sans-serif; letter-spacing: 0.16em; text-transform: uppercase; fill: #6f7c88; }
      .title { font: 700 34px 'Avenir Next', 'Segoe UI', sans-serif; fill: #18222d; }
      .subtitle { font: 400 18px 'Avenir Next', 'Segoe UI', sans-serif; fill: #53606d; }
      .card-title-dark { font: 700 21px 'Avenir Next', 'Segoe UI', sans-serif; fill: #18222d; }
      .card-title-light { font: 700 21px 'Avenir Next', 'Segoe UI', sans-serif; fill: #ffffff; }
      .body { font: 500 15px 'Avenir Next', 'Segoe UI', sans-serif; fill: #43505d; }
      .body-light { font: 500 15px 'Avenir Next', 'Segoe UI', sans-serif; fill: rgba(255,255,255,0.9); }
      .small { font: 500 14px 'Avenir Next', 'Segoe UI', sans-serif; fill: #556270; }
      .small-light { font: 500 14px 'Avenir Next', 'Segoe UI', sans-serif; fill: rgba(255,255,255,0.85); }
      .tiny { font: 600 12px 'Avenir Next', 'Segoe UI', sans-serif; letter-spacing: 0.06em; fill: #74808b; text-transform: uppercase; }
      .line { fill: none; stroke: #5a6773; stroke-width: 2.5; marker-end: url(#arrow); }
      .line-bidir { fill: none; stroke: #5a6773; stroke-width: 2.5; marker-start: url(#arrow); marker-end: url(#arrow); }
      .line-dashed { fill: none; stroke: #7f8d99; stroke-width: 2.5; stroke-dasharray: 10 7; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="canvas" x="0" y="0" width="1600" height="1180"/>

  <text class="title" x="60" y="74">BLT architecture overview</text>
  <text class="subtitle" x="60" y="108">Current runtime wiring, shared state, filesystem persistence, and the inactive full-map code path.</text>

  <rect class="panel" x="40" y="200" width="320" height="430" rx="28"/>
  <text class="panel-label" x="64" y="235">Launch paths</text>

  <rect class="panel" x="400" y="120" width="680" height="540" rx="28"/>
  <text class="panel-label" x="424" y="155">Shiny / golem package core</text>

  <rect class="panel" x="270" y="700" width="810" height="340" rx="28"/>
  <text class="panel-label" x="294" y="735">Server modules</text>

  <rect class="panel" x="1110" y="180" width="360" height="650" rx="28"/>
  <text class="panel-label" x="1134" y="215">Filesystem persistence</text>

  <rect class="panel" x="1110" y="860" width="360" height="220" rx="28"/>
  <text class="panel-label" x="1134" y="895">External runtime deps</text>

  <path class="line" d="M 320 146 C 396 146 408 306 440 307"/>
  <path class="line" d="M 330 287 C 372 287 372 560 200 560"/>
  <path class="line" d="M 200 412 L 200 430"/>
  <path class="line" d="M 200 502 L 200 520"/>
  <path class="line" d="M 330 560 C 390 560 394 207 440 207"/>
  <path class="line" d="M 330 560 C 412 560 462 207 650 207"/>
  <path class="line" d="M 530 244 L 530 270"/>
  <path class="line" d="M 620 207 C 640 207 644 307 650 307"/>
  <path class="line" d="M 620 307 C 642 307 642 219 650 219"/>
  <path class="line" d="M 745 270 L 745 244"/>
  <path class="line" d="M 530 244 C 530 290 516 366 516 410"/>
  <path class="line" d="M 650 207 C 628 207 608 316 600 410"/>
  <path class="line" d="M 745 244 C 745 304 765 360 765 410"/>
  <path class="line" d="M 840 207 C 930 207 930 486 930 560"/>
  <path class="line" d="M 740 244 C 740 420 675 580 675 700"/>
  <path class="line-bidir" d="M 515 620 C 500 672 450 696 425 740"/>
  <path class="line-bidir" d="M 690 620 L 690 740"/>
  <path class="line-bidir" d="M 865 620 C 885 672 895 696 905 740"/>
  <path class="line-bidir" d="M 650 470 C 740 470 990 245 1145 245"/>
  <path class="line" d="M 840 220 C 1010 220 1060 348 1145 349"/>
  <path class="line" d="M 650 430 C 760 430 980 356 1145 356"/>
  <path class="line-bidir" d="M 840 220 C 1010 220 1040 639 1145 639"/>
  <path class="line-bidir" d="M 840 230 C 1026 230 1052 745 1145 745"/>
  <path class="line-bidir" d="M 530 470 C 720 470 1000 453 1145 453"/>
  <path class="line-bidir" d="M 425 870 C 640 870 920 453 1145 453"/>
  <path class="line" d="M 690 870 C 930 870 1030 569 1145 569"/>
  <path class="line" d="M 905 870 C 1015 870 1050 569 1145 569"/>
  <path class="line" d="M 690 870 C 915 870 1000 949 1145 949"/>
  <path class="line" d="M 905 870 C 1060 870 1090 949 1300 949"/>
  <path class="line-dashed" d="M 1010 948 C 1080 948 1080 1047 1145 1047"/>

  <g>
    <rect class="card soft" x="70" y="110" width="250" height="72" rx="20"/>
    <text class="card-title-dark" x="195" y="150" text-anchor="middle">Browser user</text>
    <text class="small" x="195" y="172" text-anchor="middle">clicks, uploads, annotates</text>
  </g>

  <g>
    <rect class="card launch" x="70" y="250" width="260" height="74" rx="20"/>
    <text class="card-title-dark" x="200" y="292" text-anchor="middle">app/dev/run_dev.R</text>
    <text class="small" x="200" y="314" text-anchor="middle">local dev launcher</text>
  </g>

  <g>
    <rect class="card launch" x="70" y="340" width="260" height="74" rx="20"/>
    <text class="card-title-dark" x="200" y="382" text-anchor="middle">docker_entrypoint.sh</text>
    <text class="small" x="200" y="404" text-anchor="middle">seed project + generate YAML</text>
  </g>

  <g>
    <rect class="card launch" x="70" y="430" width="260" height="72" rx="20"/>
    <text class="card-title-dark" x="200" y="472" text-anchor="middle">infra/.../run_app.R</text>
    <text class="small" x="200" y="494" text-anchor="middle">container runtime wrapper</text>
  </g>

  <g>
    <rect class="card accent" x="70" y="520" width="260" height="82" rx="22"/>
    <text class="card-title-light" x="200" y="566" text-anchor="middle">blt::run_app()</text>
    <text class="small-light" x="200" y="590" text-anchor="middle">shinyApp(ui = app_ui, server = app_server)</text>
  </g>

  <g>
    <rect class="card ui" x="440" y="170" width="180" height="74" rx="20"/>
    <text class="card-title-dark" x="530" y="212" text-anchor="middle">app_ui()</text>
    <text class="small" x="530" y="234" text-anchor="middle">builds auth + app shell</text>
  </g>

  <g>
    <rect class="card server" x="650" y="170" width="190" height="74" rx="20"/>
    <text class="card-title-dark" x="745" y="212" text-anchor="middle">app_server()</text>
    <text class="small" x="745" y="234" text-anchor="middle">auth, workspace, module init</text>
  </g>

  <g>
    <rect class="card ui" x="440" y="270" width="180" height="74" rx="20"/>
    <text class="card-title-dark" x="530" y="312" text-anchor="middle">auth_page_ui()</text>
    <text class="small" x="530" y="334" text-anchor="middle">login form</text>
  </g>

  <g>
    <rect class="card ui" x="650" y="270" width="190" height="74" rx="20"/>
    <text class="card-title-dark" x="745" y="312" text-anchor="middle">main_app_ui()</text>
    <text class="small" x="745" y="334" text-anchor="middle">image, upload, annotation panels</text>
  </g>

  <g>
    <rect class="card state-global" x="440" y="410" width="210" height="120" rx="22"/>
    <text class="card-title-dark" x="545" y="448" text-anchor="middle">myEnv</text>
    <text class="body" x="468" y="476">config_dir</text>
    <text class="body" x="468" y="499">data_dir</text>
    <text class="body" x="468" y="522">project_config_file, config</text>
  </g>

  <g>
    <rect class="card state-auth" x="670" y="410" width="190" height="120" rx="22"/>
    <text class="card-title-dark" x="765" y="448" text-anchor="middle">auth</text>
    <text class="body" x="696" y="476">login, role, display_name</text>
    <text class="body" x="696" y="499">restore_token</text>
    <text class="body" x="696" y="522">lock_claimed, timeout</text>
  </g>

  <g>
    <rect class="card state-bus" x="440" y="560" width="500" height="60" rx="22"/>
    <text class="card-title-dark" x="690" y="597" text-anchor="middle">r shared reactiveValues bus</text>
  </g>

  <g>
    <text class="tiny" x="460" y="648">common fields</text>
    <text class="small" x="560" y="648">imgs_lst, imgs_metadata, current_image, annotations, refresh_user_config</text>
  </g>

  <g>
    <rect class="card module-form" x="320" y="740" width="210" height="130" rx="22"/>
    <text class="card-title-dark" x="425" y="778" text-anchor="middle">mod_control_form</text>
    <text class="body" x="346" y="806">settings + admin sync</text>
    <text class="body" x="346" y="829">annotation cards</text>
    <text class="body" x="346" y="852">export + quick fill</text>
  </g>

  <g>
    <rect class="card module-upload" x="560" y="740" width="210" height="130" rx="22"/>
    <text class="card-title-dark" x="665" y="778" text-anchor="middle">mod_leaflet_map</text>
    <text class="body" x="586" y="806">current UI uses upload-only</text>
    <text class="body" x="586" y="829">copies JPG/PNG into workspace</text>
    <text class="body" x="586" y="852">loads EXIF metadata</text>
  </g>

  <g>
    <rect class="card module-pano" x="800" y="740" width="210" height="130" rx="22"/>
    <text class="card-title-dark" x="905" y="778" text-anchor="middle">mod_360_image</text>
    <text class="body" x="826" y="806">picker + navigation</text>
    <text class="body" x="826" y="829">Leaflet draw/edit overlay</text>
    <text class="body" x="826" y="852">crop export + Pannellum iframe</text>
  </g>

  <g>
    <rect class="note" x="320" y="900" width="690" height="120" rx="22"/>
    <text class="tiny" x="346" y="932">inactive but present in code</text>
    <text class="body" x="346" y="958">Full Leaflet map rendering, KML overlay, map drawing and map annotations still exist in</text>
    <text class="body" x="346" y="981">the module, but main_app_ui mounts mod_leaflet_map_kmz_ui() and app_server starts</text>
    <text class="body" x="346" y="1004">the server with map_enabled = FALSE.</text>
  </g>

  <g>
    <rect class="card storage" x="1145" y="220" width="290" height="74" rx="20"/>
    <text class="card-title-dark" x="1290" y="262" text-anchor="middle">project YAML</text>
    <text class="small" x="1290" y="284" text-anchor="middle">labels, lookups, styling, export mode</text>
  </g>

  <g>
    <rect class="card storage" x="1145" y="314" width="290" height="74" rx="20"/>
    <text class="card-title-dark" x="1290" y="356" text-anchor="middle">auth_users.csv</text>
    <text class="small" x="1290" y="378" text-anchor="middle">login, password, role, annotation identity</text>
  </g>

  <g>
    <rect class="card storage" x="1145" y="408" width="290" height="94" rx="20"/>
    <text class="card-title-dark" x="1290" y="448" text-anchor="middle">projectFolder / data_dir</text>
    <text class="body" x="1173" y="476">per-user *_annotations.rds</text>
    <text class="body" x="1173" y="499">legacy userAnnotations.rds</text>
  </g>

  <g>
    <rect class="card storage" x="1145" y="522" width="290" height="94" rx="20"/>
    <text class="card-title-dark" x="1290" y="562" text-anchor="middle">tempdir() workspace</text>
    <text class="body" x="1173" y="590">blt_workspaces/&lt;workspace_id&gt;/files</text>
    <text class="body" x="1173" y="613">workspace_state.rds</text>
  </g>

  <g>
    <rect class="card storage" x="1145" y="636" width="290" height="74" rx="20"/>
    <text class="card-title-dark" x="1290" y="678" text-anchor="middle">.blt_config_refresh.rds</text>
    <text class="small" x="1290" y="700" text-anchor="middle">cross-session config reload signal</text>
  </g>

  <g>
    <rect class="card storage" x="1145" y="730" width="290" height="94" rx="20"/>
    <text class="card-title-dark" x="1290" y="770" text-anchor="middle">auth session files</text>
    <text class="body" x="1173" y="798">.auth_session_locks</text>
    <text class="body" x="1173" y="821">.auth_restore_sessions</text>
  </g>

  <g>
    <rect class="card external" x="1145" y="910" width="135" height="78" rx="20"/>
    <text class="card-title-dark" x="1212.5" y="954" text-anchor="middle">ExifTool</text>
    <text class="small" x="1212.5" y="976" text-anchor="middle">via exiftoolr</text>
  </g>

  <g>
    <rect class="card external" x="1300" y="910" width="135" height="78" rx="20"/>
    <text class="card-title-dark" x="1367.5" y="954" text-anchor="middle">Pannellum</text>
    <text class="small" x="1367.5" y="976" text-anchor="middle">360 viewer iframe</text>
  </g>

  <g>
    <rect class="card external" x="1145" y="1010" width="290" height="74" rx="20"/>
    <text class="card-title-dark" x="1290" y="1052" text-anchor="middle">Map tile providers</text>
    <text class="small" x="1290" y="1074" text-anchor="middle">used only by the inactive full-map path</text>
  </g>
</svg>
